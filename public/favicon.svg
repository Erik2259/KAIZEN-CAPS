<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="16" fill="#0A0A0C"/>

  <!-- Enso brushstroke: cuerpo principal -->
  <path
    d="M 50 8
       C 75 8, 92 25, 92 50
       C 92 75, 75 92, 50 92
       C 25 92, 8 75, 8 50
       C 8 28, 22 12, 44 8.5"
    fill="none" stroke="#0047FF" stroke-width="13"
    stroke-linecap="round" stroke-linejoin="round"
    opacity="1"
  />
  <!-- Textura interior — segundo trazo desplazado para efecto pincel -->
  <path
    d="M 50 10
       C 73 10, 89 26, 89 50
       C 89 74, 73 90, 50 90
       C 27 90, 11 74, 11 50
       C 11 30, 24 14, 46 10.5"
    fill="none" stroke="#2255FF" stroke-width="4"
    stroke-linecap="round" opacity="0.45"
  />
  <!-- Textura exterior -->
  <path
    d="M 50 6
       C 77 6, 94 24, 94 50
       C 94 76, 77 94, 50 94
       C 23 94, 6 76, 6 50
       C 6 26, 21 10, 43 6.5"
    fill="none" stroke="#0033CC" stroke-width="3"
    stroke-linecap="round" opacity="0.3"
  />
  <!-- Cola del pincel — el extremo que abre el círculo -->
  <path
    d="M 44 8.5 C 48 7.5, 52 7, 50 8"
    fill="none" stroke="#0047FF" stroke-width="5"
    stroke-linecap="round" opacity="0.6"
  />
</svg>
